<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Lucky Movin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Lucky Movin</h1>
        </div>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Contact Me</h2>

            <article class="card contact-card">
                <p><strong>Phone:</strong> 0759250650</p>
                <p><strong>Email:</strong> lucky.onyango@students.jkuat.ac.ke</p>
            </article>

            <form class="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <label for="subject">Subject:</label>
                <input type="text" id="subject" placeholder="Enter subject">

                <label for="message">Message:</label>
                <textarea id="message" rows="6" placeholder="Write your message" required></textarea>

                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Lucky Movin | All Rights Reserved</p>
    </footer>

</body>
</html>
